<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrintFlow — Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="printflow.css">
  <style>
    body { display: flex; }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-sq"><svg viewBox="0 0 24 24"><path d="M5 4h14a1 1 0 011 1v3H4V5a1 1 0 011-1zm-1 6h16v9a1 1 0 01-1 1H5a1 1 0 01-1-1V10zm4 3v2h2v-2H8zm4 0v2h2v-2h-2z"/></svg></div>
    <span class="logo-name">Print<em>Flow</em></span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Navigation</div>
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 9h18M9 21V9"/></svg>
      Demandes
    </a>
    <a class="nav-item active" href="planning.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Planning
    </a>
    <div class="nav-section">Filtrer</div>
    <div class="nav-item active" id="f-all"       onclick="toggleFilter('all')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      Tout afficher
    </div>
    <div class="nav-item" id="f-en_cours"  onclick="toggleFilter('en_cours')"><span class="dot dot-en_cours"></span>En cours</div>
    <div class="nav-item" id="f-produit"   onclick="toggleFilter('produit')"><span class="dot dot-produit"></span>Produit</div>
    <div class="nav-item" id="f-expedie"   onclick="toggleFilter('expedie')"><span class="dot dot-expedie"></span>Expédié</div>
  </nav>
  <div class="sidebar-user">
    <div class="user-name"  id="user-name">—</div>
    <div class="user-email" id="user-email">—</div>
    <button class="btn-logout" onclick="logout()">← Déconnexion</button>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Planning</div>
      <div class="week-nav">
        <button class="btn-nav" onclick="prevWeek()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="week-label" id="week-label">—</div>
        <button class="btn-nav" onclick="nextWeek()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
      </div>
    </div>
    <div class="fb-status">
      <div class="fb-dot" id="fb-dot"></div>
      <span id="fb-label">Firebase…</span>
    </div>
  </div>

  <div class="legend-bar">
    <div class="legend-item"><div class="legend-dot ld-en_cours"></div>En cours</div>
    <div class="legend-item"><div class="legend-dot ld-produit"></div>Produit</div>
    <div class="legend-item"><div class="legend-dot ld-expedie"></div>Expédié</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;color:var(--muted);">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);"></span>
      Livraison dépassée
    </div>
  </div>

  <div class="cal-container">
    <div id="cal-wrap">
      <div class="loading-state"><div class="spinner"></div>Chargement…</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- ══ MODALE DÉTAIL ══ -->
<div class="overlay" id="overlay-detail">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-cmd" id="det-cmd">—<em id="det-client">—</em></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item"><span class="info-label">Statut</span><span id="det-statut">—</span></div>
        <div class="info-item"><span class="info-label">Livraison</span><span class="info-value" id="det-livraison">—</span></div>
        <div class="info-item"><span class="info-label">Expédition</span><span class="info-value" id="det-expedition">—</span></div>
        <div class="info-item"><span class="info-label">Créateur</span><span class="info-value" id="det-createur">—</span></div>
        <div class="info-item"><span class="info-label">N° commande</span><span class="info-value mono" id="det-num">—</span></div>
        <div class="info-item"><span class="info-label">BPI</span><span class="info-value" id="det-bpi">—</span></div>
      </div>
      <div id="det-bpis"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeDetail()">Fermer</button>
      <a class="btn-goto" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Voir la demande
      </a>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
'use strict';

/* ── Config ── */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBCHa03MhQUMFc2xBggzAqvxDitomALiAk",
  authDomain:        "gestion-de-demandes.firebaseapp.com",
  projectId:         "gestion-de-demandes",
  storageBucket:     "gestion-de-demandes.firebasestorage.app",
  messagingSenderId: "300350796313",
  appId:             "1:300350796313:web:8054d934e7ff408338b088"
};

/* ── Auth ── */
const _raw = sessionStorage.getItem('pf_user');
if (!_raw) location.href = 'index.html';
const ME = JSON.parse(_raw || '{}');
document.getElementById('user-name').textContent  = ME.name  || '—';
document.getElementById('user-email').textContent = ME.email || '—';
function logout() { sessionStorage.removeItem('pf_user'); location.href = 'index.html'; }

/* ── Firebase ── */
firebase.initializeApp(FIREBASE_CONFIG);
const DB  = firebase.firestore();
const COL = DB.collection('demandes');

function setFbStatus(ok, label) {
  document.getElementById('fb-dot').className    = 'fb-dot '+(ok?'ok':'error');
  document.getElementById('fb-label').textContent = label;
}

/* ── État ── */
let CACHE         = [];
let currentMonday = getMonday(new Date());
let activeFilter  = 'all';

/* ── Dates ── */
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  dt.setDate(dt.getDate() + (day===0 ? -6 : 1-day));
  dt.setHours(0,0,0,0);
  return dt;
}
function addDays(d, n) { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function toLocalDate(str) { if(!str) return null; const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); }

/* ── Labels ── */
const STATUTS     = { brouillon:'Brouillon', en_cours:'En cours', produit:'Produit', expedie:'Expédié' };
const EXPEDITIONS = { a_emporter:'À emporter', a_livrer:'À livrer', tnt:'TNT' };
const JOURS       = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MOIS        = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];

/* ── Navigation ── */
function prevWeek() { currentMonday=addDays(currentMonday,-7); render(); }
function nextWeek() { currentMonday=addDays(currentMonday, 7); render(); }
function goToday()  { currentMonday=getMonday(new Date()); render(); }

/* ── Filtre ── */
function toggleFilter(f) {
  activeFilter = f;
  ['all','en_cours','produit','expedie'].forEach(id => {
    const el = document.getElementById('f-'+id);
    if (el) el.classList.toggle('active', id===f);
  });
  render();
}

/* ── Listener Firebase ── */
COL.orderBy('createdAt','desc').onSnapshot(
  snap => { CACHE=snap.docs.map(d=>({id:d.id,...d.data()})); setFbStatus(true,'Connecté'); render(); },
  err  => { setFbStatus(false,'Erreur Firebase'); console.error(err); }
);

/* ══ RENDU ══ */
function render() {
  const today  = new Date(); today.setHours(0,0,0,0);
  const days   = Array.from({length:7},(_,i)=>addDays(currentMonday,i));
  const sunday = days[6];

  const d1=days[0], d7=days[6];
  document.getElementById('week-label').textContent =
    `${d1.getDate()} ${MOIS[d1.getMonth()]} — ${d7.getDate()} ${MOIS[d7.getMonth()]} ${d7.getFullYear()}`;

  const demandes = CACHE.filter(d => {
    if (!d.livraison) return false;
    if (activeFilter!=='all' && d.statut!==activeFilter) return false;
    return true;
  });

  const byDay = {};
  days.forEach(d => { byDay[d.toDateString()]=[]; });
  demandes.forEach(d => {
    const liv = toLocalDate(d.livraison);
    if (!liv) return;
    const key = liv.toDateString();
    if (byDay[key]!==undefined) byDay[key].push(d);
  });

  const rows = activeFilter==='all' ? ['en_cours','produit','expedie'] : activeFilter==='brouillon' ? [] : [activeFilter];

  let html = `<div class="cal-grid">`;

  /* En-têtes */
  html += `<div class="cal-header-empty cal-day-header"></div>`;
  days.forEach((d,i) => {
    const isToday = isSameDay(d,today);
    html += `
      <div class="cal-day-header ${isToday?'today-col':''}">
        <div class="day-name">${JOURS[i]}</div>
        <div class="day-num ${isToday?'today':''}">${d.getDate()}</div>
        <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px;">${MOIS[d.getMonth()]}</div>
      </div>`;
  });

  /* Lignes */
  rows.forEach(statut => {
    const weekCount = days.reduce((acc,d) => acc+(byDay[d.toDateString()]||[]).filter(x=>x.statut===statut).length, 0);
    html += `
      <div class="cal-row-label">
        <div>
          <span class="row-label-text">${STATUTS[statut]}</span>
          <span class="row-label-count">${weekCount}</span>
        </div>
      </div>`;
    days.forEach((d,i) => {
      const isToday=isSameDay(d,today), isWeekend=i>=5;
      const items=(byDay[d.toDateString()]||[]).filter(x=>x.statut===statut);
      html += `<div class="cal-cell ${isToday?'today-col':''} ${isWeekend?'weekend':''}">`;
      items.forEach(dem => {
        const isLate=toLocalDate(dem.livraison)<today && dem.statut!=='expedie';
        html += `
          <div class="cal-event ${dem.statut}" onclick="showDetail('${dem.id}')">
            ${isLate?'<span class="ev-late" title="Livraison dépassée"></span>':''}
            <span class="ev-cmd">${esc(dem.commande||'—')}</span>
            <span class="ev-cli">${esc(dem.client)}</span>
            <span class="ev-exp">${EXPEDITIONS[dem.expedition]||'—'} · ${(dem.bpis||[]).length} BPI</span>
          </div>`;
      });
      html += `</div>`;
    });
  });

  html += `</div>`;

  /* Hors semaine */
  const horsPlanning = demandes.filter(d => {
    if (!d.livraison) return true;
    const liv=toLocalDate(d.livraison);
    return liv<currentMonday || liv>sunday;
  });

  if (horsPlanning.length>0) {
    html += `
      <div style="margin-top:16px;padding:12px 14px;background:white;border:1px solid var(--border);">
        <div class="col-title" style="margin-bottom:10px;">Autres semaines (${horsPlanning.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;">`;
    horsPlanning.forEach(d => {
      const liv=d.livraison?toLocalDate(d.livraison).toLocaleDateString('fr-FR'):'sans date';
      html += `
        <div class="cal-event ${d.statut}" style="cursor:pointer;min-width:130px;flex:0 0 auto;" onclick="showDetail('${d.id}')">
          <span class="ev-cmd">${esc(d.commande||'—')}</span>
          <span class="ev-cli">${esc(d.client)}</span>
          <span class="ev-exp">Livraison : ${liv}</span>
        </div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('cal-wrap').innerHTML = html;
}

/* ══ MODALE DÉTAIL ══ */
function showDetail(id) {
  const d = CACHE.find(x=>x.id===id);
  if (!d) return;
  const liv = d.livraison?toLocalDate(d.livraison).toLocaleDateString('fr-FR'):'—';

  document.getElementById('det-cmd').childNodes[0].nodeValue = d.commande||'—';
  document.getElementById('det-client').textContent    = d.client;
  document.getElementById('det-statut').innerHTML      = `<span class="pill pill-${d.statut}">${STATUTS[d.statut]}</span>`;
  document.getElementById('det-livraison').textContent = liv;
  document.getElementById('det-expedition').textContent= EXPEDITIONS[d.expedition]||'—';
  document.getElementById('det-createur').textContent  = d.createur||'—';
  document.getElementById('det-num').textContent       = d.commande||'—';
  document.getElementById('det-bpi').textContent       = `${(d.bpis||[]).length} BPI`;

  const bpis = d.bpis||[];
  let bpiHTML = '';
  if (bpis.length>0) {
    bpiHTML = `<div style="margin-top:16px;"><div class="bpi-sum-title">Bons pour impression</div>`;
    bpis.forEach((b,i) => {
      bpiHTML += `
        <div class="bpi-sum-item">
          <strong>BPI #${String(i+1).padStart(2,'0')} — ${b.type==='souple'?'🪁 Souple':'🔩 Rigide'}</strong>
          ${esc(b.formatL)} × ${esc(b.formatH)} · ${esc(b.matiere)} · ${b.exemplaires} ex.
          ${b.finition?`<div style="color:var(--muted);margin-top:2px;font-size:11px;">Finition : ${esc(b.finition)}</div>`:''}
        </div>`;
    });
    bpiHTML += `</div>`;
  }
  document.getElementById('det-bpis').innerHTML = bpiHTML;
  document.getElementById('overlay-detail').classList.add('show');
}

function closeDetail() { document.getElementById('overlay-detail').classList.remove('show'); }

document.getElementById('overlay-detail').addEventListener('click', e => {
  if(e.target===document.getElementById('overlay-detail')) closeDetail();
});

function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
