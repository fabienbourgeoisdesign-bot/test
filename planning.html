<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrintFlow — Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0e0d;
      --paper:   #f5f0e8;
      --accent:  #e84c2b;
      --blue:    #2b6de8;
      --green:   #1a9e5c;
      --yellow:  #d4920a;
      --muted:   #8a867e;
      --border:  #d4cfc6;
      --white:   #ffffff;
      --sidebar: 220px;
    }

    body { font-family: 'DM Sans', ui-sans-serif, sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sidebar); background: var(--ink); color: white;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; overflow-y: auto;
    }
    .sidebar-logo { padding: 26px 22px 20px; border-bottom: 1px solid #252321; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-sq { width: 32px; height: 32px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-sq svg { width: 17px; height: 17px; fill: white; }
    .logo-name { font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; }
    .logo-name em { color: var(--accent); font-style: normal; }

    .sidebar-nav { padding: 16px 0; flex: 1; }
    .nav-section { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: #3e3c3a; padding: 0 22px; margin: 16px 0 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 22px;
      font-size: 13.5px; color: #9a9490; cursor: pointer;
      border-left: 3px solid transparent; transition: background .12s, color .12s; user-select: none;
      text-decoration: none;
    }
    .nav-item:hover  { background: #1c1a18; color: #d4d0ca; }
    .nav-item.active { background: #1c1a18; color: white; border-left-color: var(--accent); }
    .nav-item svg    { width: 15px; height: 15px; flex-shrink: 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .dot-brouillon { background: var(--muted); }
    .dot-en_cours  { background: var(--yellow); }
    .dot-produit   { background: var(--blue); }
    .dot-expedie   { background: var(--green); }

    .sidebar-user { padding: 18px 22px; border-top: 1px solid #252321; flex-shrink: 0; }
    .user-name  { font-size: 13px; font-weight: 600; color: white; margin-bottom: 2px; }
    .user-email { font-size: 12px; color: #6a6460; }
    .btn-logout { margin-top: 12px; width: 100%; padding: 8px; background: transparent; border: 1px solid #303030; color: #5a5654; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: .04em; transition: border-color .15s, color .15s; }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ MAIN ══ */
    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      height: 62px; padding: 0 30px;
      background: var(--white); border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-title { font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 19px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; }

    .week-nav { display: flex; align-items: center; gap: 8px; }
    .btn-nav {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1.5px solid var(--border); cursor: pointer; color: var(--ink);
      transition: all .14s;
    }
    .btn-nav:hover { border-color: var(--ink); background: var(--paper); }
    .btn-nav svg { width: 14px; height: 14px; }

    .week-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink); font-weight: 500; min-width: 160px; text-align: center; }

    .btn-today {
      padding: 6px 14px; background: transparent; border: 1.5px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); cursor: pointer;
      transition: all .14s; letter-spacing: .03em;
    }
    .btn-today:hover { border-color: var(--ink); color: var(--ink); }

    .fb-status { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .fb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .fb-dot.ok    { background: var(--green); }
    .fb-dot.error { background: var(--accent); }

    /* ══ LÉGENDE ══ */
    .legend-bar {
      padding: 10px 30px; background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .ld-brouillon { background: #e8e6e2; border: 1px solid var(--muted); }
    .ld-en_cours  { background: #fef3d4; border: 1px solid var(--yellow); }
    .ld-produit   { background: #dce8fd; border: 1px solid var(--blue); }
    .ld-expedie   { background: #d4f0e5; border: 1px solid var(--green); }

    /* ══ CALENDRIER ══ */
    .cal-container { flex: 1; overflow-x: auto; padding: 24px 30px; }

    .cal-grid {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      min-width: 760px;
      border: 1.5px solid var(--border);
      background: var(--border);
      gap: 1px;
    }

    /* En-têtes des jours */
    .cal-header-empty { background: var(--paper); }
    .cal-day-header {
      background: var(--white); padding: 12px 10px;
      text-align: center;
    }
    .day-name { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .day-num  { font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 20px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
    .day-num.today { color: var(--accent); }
    .cal-day-header.today-col { background: #fff8f7; border-top: 3px solid var(--accent); }

    /* Lignes */
    .cal-row-label {
      background: var(--paper); padding: 10px 12px;
      display: flex; align-items: flex-start;
    }
    .row-label-text { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); line-height: 1.4; }
    .row-label-count { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--ink); display: block; margin-top: 2px; }

    .cal-cell {
      background: var(--white); padding: 8px 8px; min-height: 90px;
      vertical-align: top; position: relative;
    }
    .cal-cell.today-col { background: #fff8f7; }
    .cal-cell.weekend   { background: #faf8f4; }
    .cal-cell.today-col.weekend { background: #fff4f2; }

    /* Événements dans le calendrier */
    .cal-event {
      padding: 5px 8px; margin-bottom: 5px; cursor: pointer;
      border-left: 3px solid; font-size: 11px; line-height: 1.4;
      transition: opacity .14s, transform .14s;
      position: relative;
    }
    .cal-event:hover { opacity: .85; transform: translateX(2px); }
    .cal-event:last-child { margin-bottom: 0; }

    .cal-event.brouillon { background: #f0ece6; border-color: var(--muted); color: var(--ink); }
    .cal-event.en_cours  { background: #fef3d4; border-color: var(--yellow); color: #7a5200; }
    .cal-event.produit   { background: #dce8fd; border-color: var(--blue); color: #133b8a; }
    .cal-event.expedie   { background: #d4f0e5; border-color: var(--green); color: #0d5230; }

    .ev-cmd  { font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 11px; font-weight: 800; display: block; letter-spacing: -0.01em; }
    .ev-cli  { font-size: 10px; opacity: .75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .ev-exp  { font-family: 'DM Mono', monospace; font-size: 9px; opacity: .6; display: block; margin-top: 2px; }

    /* Badge "semaine passée" si livraison dépassée */
    .ev-late { position: absolute; top: 4px; right: 5px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* ══ POPIN DÉTAIL ══ */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(15,14,13,.55); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .modal {
      background: white; border: 2px solid var(--ink); box-shadow: 10px 10px 0 var(--ink);
      width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      animation: pop .2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes pop { from { opacity:0; transform: scale(.96) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .modal-head { padding: 20px 24px 16px; border-bottom: 1.5px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .modal-cmd  { font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
    .modal-cmd em { font-style: normal; display: block; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted); margin-top: 2px; letter-spacing: 0; }
    .modal-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: transparent; border: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; transition: all .12s; }
    .modal-close:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .modal-close svg { width: 12px; height: 12px; }
    .modal-body { padding: 20px 24px; }
    .modal-foot { padding: 14px 24px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .info-item { display: flex; flex-direction: column; gap: 3px; }
    .info-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .info-value { font-size: 14px; font-weight: 600; }
    .info-value.mono { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 13px; }

    .pill { padding: 3px 9px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; border: 1px solid; display: inline-block; }
    .pill-brouillon { color: var(--muted);   border-color: var(--muted);   background: #f4f3f1; }
    .pill-en_cours  { color: var(--yellow);  border-color: var(--yellow);  background: #fef8ec; }
    .pill-produit   { color: var(--blue);    border-color: var(--blue);    background: #edf2fd; }
    .pill-expedie   { color: var(--green);   border-color: var(--green);   background: #e8f7f0; }

    .bpi-summary { margin-top: 16px; }
    .bpi-sum-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .bpi-sum-item { padding: 8px 12px; background: var(--paper); border: 1px solid var(--border); margin-bottom: 6px; font-size: 12px; }
    .bpi-sum-item strong { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); display: block; margin-bottom: 3px; }

    .btn-goto {
      display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px;
      background: var(--ink); color: white;
      font-family: 'Syne', ui-sans-serif, sans-serif; font-size: 13px; font-weight: 700;
      border: 2px solid var(--ink); cursor: pointer; letter-spacing: .01em; line-height: 1.2;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .btn-goto:hover { background: var(--accent); border-color: var(--accent); }
    .btn-goto svg { width: 14px; height: 14px; }

    .btn-close-modal {
      padding: 8px 14px; background: transparent; color: var(--ink);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border); cursor: pointer; transition: border-color .15s;
    }
    .btn-close-modal:hover { border-color: var(--ink); }

    /* Loading */
    .loading-state { text-align: center; padding: 72px 20px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 22px; right: 22px; z-index: 500; background: var(--ink); color: white; padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; transform: translateY(70px); opacity: 0; transition: all .28s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<script>
'use strict';

/* ══ Config Firebase ══ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBCHa03MhQUMFc2xBggzAqvxDitomALiAk",
  authDomain:        "gestion-de-demandes.firebaseapp.com",
  projectId:         "gestion-de-demandes",

  messagingSenderId: "300350796313",
  appId:             "1:300350796313:web:8054d934e7ff408338b088"
};

/* ══ Auth ══ */
const _raw = sessionStorage.getItem('pf_user');
if (!_raw) location.href = 'index.html';
const ME = JSON.parse(_raw || '{}');
document.getElementById('user-name').textContent  = ME.name  || '—';
document.getElementById('user-email').textContent = ME.email || '—';
function logout() { sessionStorage.removeItem('pf_user'); location.href = 'index.html'; }

/* ══ Firebase ══ */
firebase.initializeApp(FIREBASE_CONFIG);
const DB  = firebase.firestore();
const COL = DB.collection('demandes');

function setFbStatus(ok, label) {
  document.getElementById('fb-dot').className    = 'fb-dot ' + (ok ? 'ok' : 'error');
  document.getElementById('fb-label').textContent = label;
}

/* ══ État ══ */
let CACHE          = [];
let currentMonday  = getMonday(new Date());
let activeFilter   = 'all'; // 'all' | statut

/* ══ Utilitaires dates ══ */
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay(); // 0=dim
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function toLocalDate(str) {
  // str = "YYYY-MM-DD"
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

/* ══ Labels ══ */
const STATUTS     = { brouillon:'Brouillon', en_cours:'En cours', produit:'Produit', expedie:'Expédié' };
const EXPEDITIONS = { a_emporter:'À emporter', a_livrer:'À livrer', tnt:'TNT' };
const JOURS       = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
const MOIS        = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];

/* ══ Navigation ══ */
function prevWeek()  { currentMonday = addDays(currentMonday, -7); render(); }
function nextWeek()  { currentMonday = addDays(currentMonday,  7); render(); }
function goToday()   { currentMonday = getMonday(new Date()); render(); }

/* ══ Filtre sidebar ══ */
function toggleFilter(f) {
  activeFilter = f;
  ['brouillon','en_cours','produit','expedie','all'].forEach(id => {
    const el = document.getElementById('f-' + id);
    if (el) el.classList.toggle('active', id === f);
  });
  render();
}

/* ══ Écoute Firebase ══ */
COL.orderBy('createdAt','desc').onSnapshot(
  snap => {
    CACHE = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setFbStatus(true, 'Connecté');
    render();
  },
  err => {
    setFbStatus(false, 'Erreur Firebase');
    console.error(err);
  }
);

/* ══ RENDU PRINCIPAL ══ */
function render() {
  const today  = new Date(); today.setHours(0,0,0,0);
  const days   = Array.from({ length: 7 }, (_, i) => addDays(currentMonday, i));
  const sunday = days[6];

  /* Label de la semaine */
  const d1 = days[0], d7 = days[6];
  document.getElementById('week-label').textContent =
    `${d1.getDate()} ${MOIS[d1.getMonth()]} — ${d7.getDate()} ${MOIS[d7.getMonth()]} ${d7.getFullYear()}`;

  /* Filtre des demandes */
  const demandes = CACHE.filter(d => {
    if (!d.livraison) return false;
    if (activeFilter !== 'all' && d.statut !== activeFilter) return false;
    return true;
  });

  /* Groupement par jour de livraison */
  const byDay = {};
  days.forEach(d => { byDay[d.toDateString()] = []; });

  demandes.forEach(d => {
    const liv = toLocalDate(d.livraison);
    if (!liv) return;
    const key = liv.toDateString();
    if (byDay[key] !== undefined) byDay[key].push(d);
  });

  /* ── Lignes de statuts à afficher ── */
  const rows = activeFilter === 'all'
    ? ['brouillon','en_cours','produit','expedie']
    : [activeFilter];

  /* ── Construction HTML ── */
  let html = `<div class="cal-grid" style="grid-template-columns: 80px repeat(7, 1fr);">`;

  /* En-têtes */
  html += `<div class="cal-header-empty cal-day-header"></div>`;
  days.forEach((d, i) => {
    const isToday   = isSameDay(d, today);
    const isWeekend = i >= 5;
    html += `
      <div class="cal-day-header ${isToday ? 'today-col' : ''}">
        <div class="day-name">${JOURS[i]}</div>
        <div class="day-num ${isToday ? 'today' : ''}">${d.getDate()}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;">${MOIS[d.getMonth()]}</div>
      </div>`;
  });

  /* Lignes par statut */
  rows.forEach(statut => {
    /* Compte total sur la semaine pour ce statut */
    const weekCount = days.reduce((acc, d) => acc + (byDay[d.toDateString()]||[]).filter(x => x.statut === statut).length, 0);

    html += `
      <div class="cal-row-label">
        <div>
          <span class="row-label-text">${STATUTS[statut]}</span>
          <span class="row-label-count">${weekCount}</span>
        </div>
      </div>`;

    days.forEach((d, i) => {
      const isToday   = isSameDay(d, today);
      const isWeekend = i >= 5;
      const items = (byDay[d.toDateString()]||[]).filter(x => x.statut === statut);

      html += `<div class="cal-cell ${isToday ? 'today-col' : ''} ${isWeekend ? 'weekend' : ''}">`;
      items.forEach(dem => {
        const liv = toLocalDate(dem.livraison);
        const isLate = liv && liv < today && dem.statut !== 'expedie';
        html += `
          <div class="cal-event ${dem.statut}" onclick="showDetail('${dem.id}')">
            ${isLate ? '<span class="ev-late" title="Livraison dépassée"></span>' : ''}
            <span class="ev-cmd">${esc(dem.commande||'—')}</span>
            <span class="ev-cli">${esc(dem.client)}</span>
            <span class="ev-exp">${EXPEDITIONS[dem.expedition]||'—'} · ${(dem.bpis||[]).length} BPI</span>
          </div>`;
      });
      html += `</div>`;
    });
  });

  html += `</div>`;

  /* Demandes sans date de livraison sur cette semaine */
  const horsPlanning = demandes.filter(d => {
    if (!d.livraison) return true;
    const liv = toLocalDate(d.livraison);
    return liv < currentMonday || liv > sunday;
  });

  if (horsPlanning.length > 0) {
    html += `
      <div style="margin-top:20px;padding:14px 16px;background:white;border:1.5px solid var(--border);">
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">
          Autres semaines (${horsPlanning.length})
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">`;
    horsPlanning.forEach(d => {
      const liv = d.livraison ? toLocalDate(d.livraison).toLocaleDateString('fr-FR') : 'sans date';
      html += `
        <div class="cal-event ${d.statut}" style="cursor:pointer;min-width:140px;flex:0 0 auto;" onclick="showDetail('${d.id}')">
          <span class="ev-cmd">${esc(d.commande||'—')}</span>
          <span class="ev-cli">${esc(d.client)}</span>
          <span class="ev-exp">Livraison : ${liv}</span>
        </div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('cal-wrap').innerHTML = html;
}

/* ══ MODALE DÉTAIL ══ */
function showDetail(id) {
  const d = CACHE.find(x => x.id === id);
  if (!d) return;

  const liv = d.livraison ? toLocalDate(d.livraison).toLocaleDateString('fr-FR') : '—';

  document.getElementById('det-cmd').childNodes[0].nodeValue = d.commande || '—';
  document.getElementById('det-client').textContent  = d.client;
  document.getElementById('det-statut').innerHTML    = `<span class="pill pill-${d.statut}">${STATUTS[d.statut]}</span>`;
  document.getElementById('det-livraison').textContent = liv;
  document.getElementById('det-expedition').textContent = EXPEDITIONS[d.expedition] || '—';
  document.getElementById('det-createur').textContent  = d.createur || '—';
  document.getElementById('det-num').textContent       = d.commande || '—';
  document.getElementById('det-bpi').textContent       = `${(d.bpis||[]).length} BPI`;

  /* Liste BPI */
  const bpis = d.bpis || [];
  let bpiHTML = '';
  if (bpis.length > 0) {
    bpiHTML = `<div class="bpi-summary"><div class="bpi-sum-title">Bons pour impression</div>`;
    bpis.forEach((b, i) => {
      bpiHTML += `
        <div class="bpi-sum-item">
          <strong>BPI #${String(i+1).padStart(2,'0')} — ${esc(b.type === 'souple' ? '🪁 Souple' : '🔩 Rigide')}</strong>
          ${esc(b.formatL)} × ${esc(b.formatH)} · ${esc(b.matiere)} · ${b.exemplaires} ex.
          ${b.finition ? `<div style="color:var(--muted);margin-top:3px;font-size:11px;">Finition : ${esc(b.finition)}</div>` : ''}
        </div>`;
    });
    bpiHTML += `</div>`;
  }
  document.getElementById('det-bpis').innerHTML = bpiHTML;
  document.getElementById('det-link').href = 'dashboard.html';

  document.getElementById('overlay-detail').classList.add('show');
}

function closeDetail() {
  document.getElementById('overlay-detail').classList.remove('show');
}

document.getElementById('overlay-detail').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay-detail')) closeDetail();
});

/* ══ Utilitaires ══ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

/* Init filtre "Tout afficher" actif par défaut */
document.getElementById('f-all').classList.add('active');
</script>
